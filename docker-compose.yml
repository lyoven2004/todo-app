services:

  frontend:
    image: lyngo704/todo-frontend:latest
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: todo-frontend
    ports:
      - "${FRONTEND_PORT}:3000"
    depends_on:
      - backend

  backend:
    image: lyngo704/todo-backend:latest
    build: ./backend
    container_name: todo-backend
    ports:
      - "${BACKEND_PORT}:5000"
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: todo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: